<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Notation Trainer</title>
<style>
  :root{
    --bg:#0d1117; --panel:#161b22; --line:#283039;
    --ink:#e6edf3; --dim:#7d8590; --accent:#f2c14e; --accent2:#58a6ff;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);color:var(--ink);
    font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;}
  #app{display:flex;flex-direction:column;height:100%;height:100dvh;}

  header{display:flex;align-items:center;justify-content:space-between;
    padding:14px 20px;border-bottom:1px solid var(--line);flex:0 0 auto;}
  header .title{font-size:14px;letter-spacing:.28em;text-transform:uppercase;color:var(--dim);}
  header .count{font-size:13px;color:var(--dim);}
  header .count b{color:var(--ink);}

  /* main = stage (left) + side panel (right). Wraps to column when narrow. */
  #main{flex:1;display:flex;min-height:0;}
  #stage{flex:1;position:relative;min-height:0;min-width:0;}
  canvas{display:block;width:100%;height:100%;}

  #note{position:absolute;top:18px;left:18px;
    display:flex;align-items:center;justify-content:center;
    min-width:130px;height:130px;padding:0 26px;
    background:var(--panel);border:1px solid var(--line);border-radius:20px;
    font-size:80px;font-weight:600;color:var(--accent);
    box-shadow:0 8px 30px rgba(0,0,0,.45);user-select:none;
    transition:opacity .15s, transform .15s;white-space:nowrap;}
  #note.idle{font-size:22px;color:var(--dim);font-weight:400;letter-spacing:.05em;}
  #note .name{position:absolute;bottom:-26px;left:0;right:0;text-align:left;
    font-size:13px;color:var(--dim);letter-spacing:.1em;}

  /* side panel */
  #panel{flex:0 0 240px;border-left:1px solid var(--line);background:var(--panel);
    padding:18px 16px;overflow-y:auto;display:flex;flex-direction:column;gap:18px;}
  .panel-title{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--dim);
    margin-bottom:2px;}
  .set{display:flex;flex-direction:column;gap:8px;}
  .set-head{display:flex;align-items:center;justify-content:space-between;gap:8px;cursor:pointer;
    user-select:none;}
  .set-head .label{font-size:13px;color:var(--ink);}
  .set-head .sub{font-size:11px;color:var(--dim);}
  /* toggle switch */
  .sw{flex:0 0 auto;width:38px;height:22px;border-radius:999px;background:var(--line);
    position:relative;transition:background .15s;}
  .sw::after{content:"";position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;
    background:var(--bg);transition:transform .15s;}
  .set.on .sw{background:var(--accent2);}
  .set.on .sw::after{transform:translateX(16px);}
  .preview{font-size:12px;color:var(--dim);letter-spacing:.08em;padding-left:2px;}
  .set.on .preview{color:var(--accent);}

  footer{border-top:1px solid var(--line);padding:14px 18px 22px;
    display:flex;flex-direction:column;gap:14px;background:var(--panel);flex:0 0 auto;}
  .row{display:flex;align-items:center;gap:12px;}
  .slider-wrap{flex:1;display:flex;flex-direction:column;gap:4px;}
  .slider-wrap label{font-size:12px;color:var(--dim);display:flex;justify-content:space-between;}
  .slider-wrap label b{color:var(--ink);}
  input[type=range]{-webkit-appearance:none;width:100%;height:30px;background:transparent;}
  input[type=range]::-webkit-slider-runnable-track{height:4px;background:var(--line);border-radius:4px;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;margin-top:-11px;
    width:26px;height:26px;border-radius:50%;background:var(--accent);border:none;}

  .btn{appearance:none;border:1px solid var(--line);background:var(--bg);color:var(--ink);
    font-family:inherit;font-size:15px;padding:14px 0;border-radius:14px;cursor:pointer;
    flex:1;letter-spacing:.05em;}
  .btn:active{transform:scale(.98);}
  .btn.primary{background:var(--accent);color:#1a1100;border-color:var(--accent);font-weight:600;}
  .btn.wide{flex:2;}

  /* Narrow / portrait: panel drops below the stage as a horizontal strip */
  @media (max-width:760px){
    #main{flex-direction:column;}
    #panel{flex:0 0 auto;max-height:34vh;border-left:none;border-top:1px solid var(--line);}
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <span class="title">Cube Notation</span>
    <span class="count">moves <b id="moveCount">0</b></span>
  </header>

  <div id="main">
    <div id="stage">
      <div id="note" class="idle">press start<span class="name"></span></div>
    </div>

    <aside id="panel">
      <div class="panel-title">Notation sets</div>
      <div id="sets"></div>
    </aside>
  </div>

  <footer>
    <div class="slider-wrap">
      <label>delay before reveal <b><span id="delayVal">1.0</span>s</b></label>
      <input id="delay" type="range" min="0.3" max="4" step="0.1" value="1">
    </div>
    <div class="slider-wrap">
      <label>pause after move <b><span id="gapVal">1.5</span>s</b></label>
      <input id="gap" type="range" min="0.5" max="6" step="0.1" value="1.5">
    </div>
    <div class="row">
      <button class="btn primary wide" id="startBtn">Start</button>
      <button class="btn" id="resetBtn">Reset view</button>
    </div>
  </footer>
</div>

<script type="importmap">
{ "imports": { "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.module.min.js" } }
</script>
<script type="module">
import * as THREE from 'three';

/* ---------- scene ---------- */
const stage = document.getElementById('stage');
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(40, 1, 0.1, 100);
camera.position.set(5.2, 5, 6.5);
camera.lookAt(0,0,0);

const renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
stage.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,0.85));
const dl = new THREE.DirectionalLight(0xffffff,0.7); dl.position.set(6,10,8); scene.add(dl);
const dl2 = new THREE.DirectionalLight(0xffffff,0.3); dl2.position.set(-6,-4,-8); scene.add(dl2);

function resize(){
  const w = stage.clientWidth, h = stage.clientHeight;
  if(w===0||h===0) return;
  renderer.setSize(w,h,false);
  camera.aspect = w/h; camera.updateProjectionMatrix();
}
new ResizeObserver(resize).observe(stage);

/* ---------- build 3x3 cube ---------- */
// U white, D yellow, F green, B blue, R red, L orange
const COL = { U:0xf5f5f5, D:0xf2c200, F:0x16a34a, B:0x1d4ed8, R:0xdc2626, L:0xea580c, inner:0x111417 };
// BoxGeometry material order: +X(R), -X(L), +Y(U), -Y(D), +Z(F), -Z(B)
const root = new THREE.Group(); scene.add(root);
const cubies = [];
const GAP = 0.06, S = 1;
const UNIT = S + GAP;
for(let x=-1;x<=1;x++) for(let y=-1;y<=1;y++) for(let z=-1;z<=1;z++){
  const mats = [
    new THREE.MeshStandardMaterial({color: x=== 1?COL.R:COL.inner}),
    new THREE.MeshStandardMaterial({color: x===-1?COL.L:COL.inner}),
    new THREE.MeshStandardMaterial({color: y=== 1?COL.U:COL.inner}),
    new THREE.MeshStandardMaterial({color: y===-1?COL.D:COL.inner}),
    new THREE.MeshStandardMaterial({color: z=== 1?COL.F:COL.inner}),
    new THREE.MeshStandardMaterial({color: z===-1?COL.B:COL.inner}),
  ];
  const c = new THREE.Mesh(new THREE.BoxGeometry(S,S,S), mats);
  c.position.set(x*UNIT, y*UNIT, z*UNIT);
  cubies.push(c); root.add(c);
}

/* ---------- moves ----------
   Pick cubies by their REAL local position, spin around the local axis.
   sign gives a clockwise quarter turn seen from outside that face.
   whole:true means a full-cube rotation (x/y/z) - we turn root itself. */
const MOVE = {
  U:{axis:'y', layers:[ 1], sign:-1},
  D:{axis:'y', layers:[-1], sign: 1},
  R:{axis:'x', layers:[ 1], sign:-1},
  L:{axis:'x', layers:[-1], sign: 1},
  F:{axis:'z', layers:[ 1], sign:-1},
  B:{axis:'z', layers:[-1], sign: 1},
  M:{axis:'x', layers:[ 0], sign: 1},
  E:{axis:'y', layers:[ 0], sign: 1},
  S:{axis:'z', layers:[ 0], sign:-1},
  r:{axis:'x', layers:[ 1, 0], sign:-1},
  l:{axis:'x', layers:[-1, 0], sign: 1},
  u:{axis:'y', layers:[ 1, 0], sign:-1},
  d:{axis:'y', layers:[-1, 0], sign: 1},
  f:{axis:'z', layers:[ 1, 0], sign:-1},
  b:{axis:'z', layers:[-1, 0], sign: 1},
  // full-cube rotations: x follows R, y follows U, z follows F
  x:{axis:'x', whole:true, sign:-1},
  y:{axis:'y', whole:true, sign:-1},
  z:{axis:'z', whole:true, sign:-1},
};
// alternate spellings -> canonical move key
const ALIAS = { Uw:'u', Dw:'d', Rw:'r', Lw:'l', Fw:'f', Bw:'b' };
function moveKey(tok){
  const m = tok.match(/^([A-Za-z]w?)/)[1];
  return ALIAS[m] || m[0];
}
function suffix(tok){ return tok.replace(/^([A-Za-z]w?)/,''); } // '', "'", or 2

// pivot lives UNDER root so layer turns are in the cube's local space,
// unaffected by the drag-to-rotate view applied to root.
const pivot = new THREE.Group(); root.add(pivot);
let animating = false;
const layerIndex = v => Math.round(v / UNIT);

function applyMove(token){
  return new Promise(res=>{
    if(animating){res();return;}
    const key = moveKey(token);
    const suf = suffix(token);
    const prime = suf.includes("'");
    const dbl = suf.includes('2');
    const def = MOVE[key];
    if(!def){res();return;}

    const turns = dbl ? 2 : 1;
    const angle = (Math.PI/2) * turns * def.sign * (prime ? -1 : 1);
    const axisVec = new THREE.Vector3(def.axis==='x'?1:0, def.axis==='y'?1:0, def.axis==='z'?1:0);
    const dur = Math.min(420, 240 + turns*90);

    if(def.whole){ return animateWhole(axisVec, angle, dur, res); }

    const sel = cubies.filter(c => def.layers.includes(layerIndex(c.position[def.axis])));
    pivot.rotation.set(0,0,0);
    pivot.updateMatrixWorld();
    sel.forEach(c => pivot.attach(c));

    animating = true;
    const t0 = performance.now();
    (function step(now){
      const t = Math.min(1,(now-t0)/dur);
      const e = t<.5 ? 2*t*t : 1-Math.pow(-2*t+2,2)/2;
      pivot.setRotationFromAxisAngle(axisVec, angle*e);
      if(t<1){ requestAnimationFrame(step); }
      else{
        pivot.setRotationFromAxisAngle(axisVec, angle);
        pivot.updateMatrixWorld();
        sel.forEach(c => { root.attach(c); snapToGrid(c); });
        animating=false; res();
      }
    })(t0);
  });
}

// full-cube rotation: spin a wrapper holding the whole cube, then bake the
// resulting orientation back into each cubie so layer math stays grid-aligned.
const spinner = new THREE.Group(); root.add(spinner);
function animateWhole(axisVec, angle, dur, res){
  spinner.rotation.set(0,0,0);
  spinner.updateMatrixWorld();
  cubies.forEach(c => spinner.attach(c));
  animating = true;
  const t0 = performance.now();
  (function step(now){
    const t = Math.min(1,(now-t0)/dur);
    const e = t<.5 ? 2*t*t : 1-Math.pow(-2*t+2,2)/2;
    spinner.setRotationFromAxisAngle(axisVec, angle*e);
    if(t<1){ requestAnimationFrame(step); }
    else{
      spinner.setRotationFromAxisAngle(axisVec, angle);
      spinner.updateMatrixWorld();
      cubies.forEach(c => { root.attach(c); snapToGrid(c); });
      animating=false; res();
    }
  })(t0);
}

// snap position + orientation to grid after each turn so float error can't build up
function snapToGrid(c){
  c.position.set(
    Math.round(c.position.x/UNIT)*UNIT,
    Math.round(c.position.y/UNIT)*UNIT,
    Math.round(c.position.z/UNIT)*UNIT
  );
  const q = Math.PI/2;
  c.rotation.x = Math.round(c.rotation.x/q)*q;
  c.rotation.y = Math.round(c.rotation.y/q)*q;
  c.rotation.z = Math.round(c.rotation.z/q)*q;
  c.updateMatrix();
}

/* ---------- notation sets (source: jperm.net/3x3/moves) ---------- */
const SETS = {
  faces:{label:'Face turns', sub:'R L U D F B', preview:"R  U  F", default:true,
    moves:['R','L','U','D','F','B']},
  prime:{label:'Inverses', sub:"counter-clockwise '", preview:"R'  U'  F'", default:false,
    moves:["R'","L'","U'","D'","F'","B'"]},
  dbl:{label:'Doubles', sub:'180\u00b0 turns', preview:"R2  U2", default:false,
    moves:['R2','L2','U2','D2','F2','B2']},
  wideLower:{label:'Wide (lowercase)', sub:'two layers: r u f', preview:"r  u  f", default:false,
    moves:['r','l','u','d','f','b',"r'","l'","u'","d'","f'","b'"]},
  wideW:{label:'Wide (Rw style)', sub:'two layers: Rw Uw', preview:"Rw  Uw", default:false,
    moves:['Rw','Lw','Uw','Dw','Fw','Bw',"Rw'","Lw'","Uw'","Dw'","Fw'","Bw'"]},
  slice:{label:'Slices', sub:'M E S middle layers', preview:"M  E  S", default:false,
    moves:['M','E','S',"M'","E'","S'"]},
  rot:{label:'Cube rotations', sub:'whole cube: x y z', preview:"x  y  z", default:false,
    moves:['x','y','z',"x'","y'","z'"]},
};
const NAMES = {R:'Right',L:'Left',U:'Up',D:'Down',F:'Front',B:'Back',
  M:'Middle',E:'Equator',S:'Standing',x:'rotate X',y:'rotate Y',z:'rotate Z'};
function describe(tok){
  const key = moveKey(tok);              // e.g. r, R, M, x
  const isRotation = 'xyz'.includes(key);
  const isWide = !isRotation && key === key.toLowerCase() && 'rludfb'.includes(key);
  const baseName = NAMES[key] || NAMES[key.toUpperCase()] || key;
  let label = baseName;
  if(isWide) label += ' wide';
  if(tok.includes("'")) label += ' inverse';
  if(tok.includes('2')) label += ' twice';
  return label;
}

/* ---------- side panel ---------- */
const active = new Set();
Object.keys(SETS).forEach(k=>{ if(SETS[k].default) active.add(k); });

const setsEl = document.getElementById('sets');
Object.keys(SETS).forEach(key=>{
  const s = SETS[key];
  const wrap = document.createElement('div');
  wrap.className = 'set' + (active.has(key)?' on':'');
  wrap.innerHTML = `
    <div class="set-head">
      <div>
        <div class="label">${s.label}</div>
        <div class="sub">${s.sub}</div>
      </div>
      <div class="sw"></div>
    </div>
    <div class="preview">${s.preview}</div>`;
  wrap.querySelector('.set-head').onclick = ()=>{
    if(active.has(key)) active.delete(key); else active.add(key);
    if(active.size===0) active.add(key); // never empty
    wrap.classList.toggle('on', active.has(key));
    buildPool();
  };
  setsEl.appendChild(wrap);
});

let pool=[];
function buildPool(){ pool=[]; active.forEach(k=>pool.push(...SETS[k].moves)); }
buildPool();

/* ---------- drill loop ---------- */
const noteEl=document.getElementById('note');
const nameEl=noteEl.querySelector('.name');
const startBtn=document.getElementById('startBtn');
const moveCountEl=document.getElementById('moveCount');
let running=false, count=0, loopToken=0;
const delayEl=document.getElementById('delay'), gapEl=document.getElementById('gap');
const sleep=ms=>new Promise(r=>setTimeout(r,ms));

async function loop(){
  const my=++loopToken;
  while(running && my===loopToken){
    const tok = pool[(Math.random()*pool.length)|0];
    noteEl.classList.remove('idle');
    noteEl.textContent=tok;
    noteEl.appendChild(nameEl);
    nameEl.textContent='';
    await sleep(parseFloat(delayEl.value)*1000);
    if(!running||my!==loopToken)break;
    await applyMove(tok);
    nameEl.textContent=describe(tok);
    count++; moveCountEl.textContent=count;
    await sleep(parseFloat(gapEl.value)*1000);
  }
}
startBtn.onclick=()=>{
  running=!running;
  startBtn.textContent=running?'Pause':'Start';
  startBtn.classList.toggle('primary',!running);
  if(running) loop();
  else { loopToken++; }
};

delayEl.oninput=()=>document.getElementById('delayVal').textContent=parseFloat(delayEl.value).toFixed(1);
gapEl.oninput=()=>document.getElementById('gapVal').textContent=parseFloat(gapEl.value).toFixed(1);

/* ---------- drag to rotate view ---------- */
let drag=false,px=0,py=0,ry=0.6,rx=0.5;
function setView(){ root.rotation.y=ry; root.rotation.x=rx; }
setView();
const cv=renderer.domElement;
function down(x,y){drag=true;px=x;py=y;}
function move(x,y){ if(!drag)return; ry+=(x-px)*0.01; rx+=(y-py)*0.01;
  rx=Math.max(-1.2,Math.min(1.2,rx)); px=x;py=y; setView(); }
function up(){drag=false;}
cv.addEventListener('mousedown',e=>down(e.clientX,e.clientY));
addEventListener('mousemove',e=>move(e.clientX,e.clientY));
addEventListener('mouseup',up);
cv.addEventListener('touchstart',e=>{down(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
cv.addEventListener('touchmove',e=>{move(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
cv.addEventListener('touchend',up);
document.getElementById('resetBtn').onclick=()=>{ry=0.6;rx=0.5;setView();};

/* ---------- render ---------- */
resize();
(function render(){ requestAnimationFrame(render); renderer.render(scene,camera); })();
</script>
</body>
</html>
